<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fashion Wear - Cart</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- ================= HEADER ================= -->
    <section id="header">
        <a href="index.html">
            <img src="img/logo1.png" class="logo" alt="Logo">
        </a>

        <div id="content">
            <ul id="navbar">
                <li><a href="index.html">Home</a></li>
                <li><a href="shop.html">Shop</a></li>
                <li><a href="blog.html">Blog</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a class="active" href="cart.html"><i class="fas fa-shopping-cart"></i></a></li>
            </ul>
        </div>
    </section>


    <!-- ================= PAGE HEADER ================= -->
    <section id="page-header">
        <h2>#Your Cart</h2>
        <p>Enjoy Shopping with coupons & up to 70% off!</p>
    </section>


    <!-- ================= CART TABLE ================= -->
    <section id="cart" class="section-p1">

        <table width="100%">

            <thead>
                <tr>
                    <td>Remove</td>
                    <td>Image</td>
                    <td>Product</td>
                    <td>Price</td>
                    <td>Quantity</td>
                    <td>Total</td>
                </tr>
            </thead>

            <!-- IMPORTANT: dynamic cart loads here -->
            <tbody id="cart-items"></tbody>

        </table>

    </section>


    <!-- ================= SUBTOTAL ================= -->
    <section id="cart-add" class="section-p1">

        <div id="coupon">
            <h3>Apply Coupons</h3>
            <div>
                <input type="text" placeholder="Enter your coupon number.">
                <button class="normal">Apply</button>
            </div>
        </div>

        <div id="subtotal">
            <h3>Cart Total</h3>

            <table>
                <tr>
                    <td>Cart Subtotal</td>
                    <td>$XXX</td>
                </tr>
                <tr>
                    <td>Shipping</td>
                    <td>Free</td>
                </tr>
                <tr>
                    <td><strong>Total</strong></td>
                    <td><strong>$XXXX</strong></td>
                </tr>
            </table>

            <button class="normal">Proceed to checkout</button>
        </div>

    </section>


    <!-- ================= SCRIPTS ================= -->

    <script src="script.js"></script>

    <script>
        // ================= CART RENDER =================

        const cartItems = document.getElementById("cart-items");

        let cart = JSON.parse(localStorage.getItem("cart")) || [];

        function renderCart() {

            cartItems.innerHTML = "";

            cart.forEach((item, index) => {

                cartItems.innerHTML += `
                <tr>
                    <td>
                        <a href="#" onclick="removeItem(${index})">
                            <i class="far fa-times-circle"></i>
                        </a>
                    </td>

                    <td>
                        <img src="${item.image}" width="60">
                    </td>

                    <td>${item.name}</td>

                    <td>${item.price}</td>

                    <td>
                        <input type="number" value="${item.quantity}">
                    </td>

                    <td>${item.price}</td>
                </tr>
                `;
            });
        }

        function removeItem(index) {
            cart.splice(index, 1);
            localStorage.setItem("cart", JSON.stringify(cart));
            renderCart();
        }

        renderCart();
    </script>

</body>

</html>
